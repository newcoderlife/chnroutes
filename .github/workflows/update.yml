name: Update Routes

on:
  schedule:
    - cron: "0 1 * * *"
  workflow_dispatch:

permissions:
  contents: write
  id-token: write
  attestations: write
  artifact-metadata: write

concurrency:
  group: update-routes
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Generate routes
        run: make generate EXCLUDE="${{ secrets.EXCLUDE }}" NEXT="${{ secrets.NEXT }}" NEXT6="${{ secrets.NEXT6 }}"

      - name: Generate checksum
        run: make checksum

      - name: Attest release assets
        uses: actions/attest@v4
        with:
          subject-path: |
            noncn.rsc
            noncn.rsc.sha256

      - name: Publish latest release asset
        uses: softprops/action-gh-release@v3
        with:
          tag_name: latest
          target_commitish: ${{ github.sha }}
          name: Latest routes
          body: |
            Generated RouterOS route script for non-China IPv4/IPv6 destinations.

            Stable download URL:
            https://github.com/${{ github.repository }}/releases/latest/download/noncn.rsc
          files: |
            noncn.rsc
            noncn.rsc.sha256
          overwrite_files: true
          make_latest: true
