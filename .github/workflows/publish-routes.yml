name: Publish Routes

on:
  push:
    branches:
      - master
  schedule:
    - cron: "0 1 * * *"
  workflow_dispatch:

permissions:
  contents: write
  id-token: write
  attestations: write
  artifact-metadata: write

concurrency:
  group: publish-routes
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Generate routes
        run: >-
          make generate
          EXCLUDE="${{ secrets.EXCLUDE }}"

      - name: Generate checksum
        run: make checksum

      - name: Set release date
        id: release_date
        run: echo "date=$(TZ=Asia/Hong_Kong date +'%Y-%m-%d')" >> "$GITHUB_OUTPUT"

      - name: Attest release assets
        uses: actions/attest@v4
        with:
          subject-path: |
            noncn4.routes
            noncn6.routes
            noncn.sha256

      - name: Publish latest release asset
        uses: softprops/action-gh-release@v3
        with:
          tag_name: latest
          target_commitish: ${{ github.sha }}
          name: ${{ steps.release_date.outputs.date }}
          body: |
            Generated BIRD 3 route assets for non-China IPv4/IPv6 destinations.

            Stable download URLs:
            https://github.com/${{ github.repository }}/releases/latest/download/noncn4.routes
            https://github.com/${{ github.repository }}/releases/latest/download/noncn6.routes
            https://github.com/${{ github.repository }}/releases/latest/download/noncn.sha256
          files: |
            noncn4.routes
            noncn6.routes
            noncn.sha256
          overwrite_files: true
          make_latest: true
